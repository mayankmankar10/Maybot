# nginx/nginx.conf
# Section 4.1 — Architecture document.
# SSL termination + reverse proxy to FastAPI.
# Route /telegram → FastAPI (127.0.0.1:8000)
# Run: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # SSL certificates (replace with your actual cert paths)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Telegram webhook route
    location /telegram {
        proxy_pass         http://127.0.0.1:8000/telegram;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Forward Telegram secret token header unchanged
        proxy_pass_header  X-Telegram-Bot-Api-Secret-Token;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Health check endpoint (for monitoring)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # Block all other routes from public access
    location / {
        return 404;
    }
}
